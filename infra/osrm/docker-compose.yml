# OSRM foot-profile pipeline. Set OSRM_REGION to the extract's base name; a
# matching ${OSRM_REGION}.osm.pbf must exist in this directory. OSRM_PORT maps
# the routed service to the host (default 5000; use 5050 on macOS, where 5000 is
# taken by the AirPlay Receiver).
# Usage: OSRM_REGION=sao-mateus OSRM_PORT=5050 docker compose up
services:
  osrm-extract:
    image: ghcr.io/project-osrm/osrm-backend:v5.27.1
    command: osrm-extract -p /opt/foot.lua /data/${OSRM_REGION}.osm.pbf
    volumes:
      - ./:/data

  osrm-partition:
    image: ghcr.io/project-osrm/osrm-backend:v5.27.1
    command: osrm-partition /data/${OSRM_REGION}.osrm
    volumes:
      - ./:/data
    depends_on:
      osrm-extract:
        condition: service_completed_successfully

  osrm-customize:
    image: ghcr.io/project-osrm/osrm-backend:v5.27.1
    command: osrm-customize /data/${OSRM_REGION}.osrm
    volumes:
      - ./:/data
    depends_on:
      osrm-partition:
        condition: service_completed_successfully

  osrm-routed:
    image: ghcr.io/project-osrm/osrm-backend:v5.27.1
    command: osrm-routed --algorithm mld --max-matching-size 100000 /data/${OSRM_REGION}.osrm
    ports:
      - "${OSRM_PORT:-5000}:5000"
    volumes:
      - ./:/data
    depends_on:
      osrm-customize:
        condition: service_completed_successfully
